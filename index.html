<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Site da Marra</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Fase 1 -->
    <section id="fase1" class="tela ativo">
        <div class="conteudo-centro">
            <h1 class="fade-in text-principal">Antes de começar....</h1>
        
        <!-- Nova Imagem entre as mensagens -->
         <img src="volume.png" id="img-intermediaria" class="img-fase1 hide" alt="Icone">

            <p class="fade-in text-secundario">Aumente o volume</p>
        
            <button id="btn-comecar" class="btn-custom hide">Vamos!</button>
        </div>
    </section>

    <!-- Fase 2 -->
    <section id="fase2" class="tela hide">
        <div id="container-gatinhos"></div>
        <div class="caixa-texto">
            <p>Fiz esse site para te alegrar! Um bj e um cheiro ❤</p>
        </div>
        <!-- Elemento de Áudio (Trilha Sonora) -->
        <audio id="trilha" loop>
            <source src="trompete.mp3" type="audio/mpeg">
        </audio>
    </section>

    <script src="script.js"></script>
</body>
</html>
